name: Tests

on:
  push:  # Run on all branches including main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install borg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y borgbackup

      - name: Install borg (macOS)
        if: runner.os == 'macOS'
        run: brew install borgbackup

      - name: Run all tests
        env:
          # The borgadm e2e suite (the only suite pulling in pytest-xdist)
          # spawns uv+python+borg per test. On the 3-vCPU macOS runner,
          # xdist's `-n auto` oversubscribes cores hard enough that some
          # borgadm calls cross the suite's 120s per-call timeout. Pin
          # macOS to one worker; Linux's cheap exec runs -n auto fine.
          PYTEST_XDIST_AUTO_NUM_WORKERS: ${{ runner.os == 'macOS' && '1' || '' }}
        run: tests/run_all.py --e2e
