name: Tests

on:
  push:  # Run on all branches including main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # borg is needed only by the e2e suite, which runs on Linux only
      # (see the run step below). The macOS leg runs the non-e2e suite,
      # which mocks every borg call, so it needs no borg binary.
      - name: Install borg
        if: runner.os == 'Linux'
        # The packages.microsoft.com repos (azure-cli, MS prod) ship
        # pre-configured on the hosted runner image and intermittently 403
        # their InRelease signature, which makes apt-get update exit 100
        # before borg is reached. We need none of them, so drop them; and
        # don't let a transient signing failure on any other repo abort the
        # install -- the only package this step actually requires is borg.
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.* \
                     /etc/apt/sources.list.d/azure-cli.*
          sudo apt-get update || true
          sudo apt-get install -y borgbackup

      # The pinned pandoc that test_render_docs.py renders the roff man
      # page with. Fetched into .tools/ by the same installer local devs
      # use, so every environment renders with the identical binary
      # (pandoc's roff output is version-sensitive). Needed on both legs
      # -- the man-page gate runs in the non-e2e suite too.
      - name: Install pinned pandoc
        run: uv run scripts/pandoc install

      - name: Run tests
        # The borgadm e2e suite forks uv+python+borgadm+borg per test --
        # a process-spawn-heavy workload. GitHub's hosted macOS runners
        # are weak, throttled VMs that run it ~20x slower than Linux and
        # intermittently cross the suite's 120s per-call timeout, while
        # Linux runs the identical suite reliably in under a minute (borg
        # itself is cross-platform, so coverage is the same). So e2e runs
        # on Linux only; macOS still runs the full non-e2e suite, which
        # is where the macOS-specific code lives (the Crony.app C wrapper
        # and the launchd automate path).
        run: tests/run_all.py ${{ runner.os == 'Linux' && '--e2e' || '' }}
