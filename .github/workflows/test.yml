name: Tests

on:
  push:  # Run on all branches including main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install borg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y borgbackup

      - name: Install borg (macOS)
        if: runner.os == 'macOS'
        run: brew install borgbackup

      - name: Run all tests
        run: tests/run_all.py --e2e
